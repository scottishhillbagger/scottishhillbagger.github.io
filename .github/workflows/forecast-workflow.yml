name: Update forecast

on:
  schedule:
    # Twice daily — shortly after MWIS updates (~7:35 and ~15:30 UTC)
    - cron: '15 8 * * *'
    - cron: '15 16 * * *'
  workflow_dispatch:  # allow manual run

permissions:
  contents: write

jobs:
  forecast:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-node@v5
        with:
          node-version: '20'

      - name: Install
        run: npm install @anthropic-ai/sdk

      - name: Generate forecast
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: node scripts/build-forecast.mjs

      - name: Commit
        run: |
          git config user.name "forecast-bot"
          git config user.email "forecast-bot@users.noreply.github.com"
          git add forecast.json
          git diff --staged --quiet || git commit -m "Update forecast $(TZ='Europe/London' date +'%Y-%m-%d %H:%M %Z')"
          git push
